[package]
name = "stir-tx-pcs-spike"
version = "0.1.0"
edition = "2021"
description = "Hegemon-specific STIR PCS spike for the transaction proof opening layer"

[workspace]

[dependencies]
anyhow = "1"
ark-poly = "0.4"
ark-serialize = "0.4"
ark-std = "0.4"
clap = { version = "4.5", features = ["derive"] }
protocol-versioning = { path = "../../protocol/versioning" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
stir = { git = "https://github.com/WizardOfMenlo/stir.git", rev = "51064ebd45667dae3b499539f4476ba6d8527610" }
transaction-core = { path = "../../circuits/transaction-core" }

[patch.crates-io]
ark-std = { git = "https://github.com/arkworks-rs/std", rev = "4cee4bc1" }
ark-crypto-primitives = { git = "https://github.com/arkworks-rs/crypto-primitives", rev = "fc1c9491" }
ark-test-curves = { git = "https://github.com/arkworks-rs/algebra", rev = "bf96a5b2" }
ark-ff = { git = "https://github.com/arkworks-rs/algebra", rev = "bf96a5b2" }
ark-poly = { git = "https://github.com/arkworks-rs/algebra", rev = "bf96a5b2" }
ark-serialize = { git = "https://github.com/arkworks-rs/algebra", rev = "bf96a5b2" }
ark-ec = { git = "https://github.com/arkworks-rs/algebra", rev = "bf96a5b2" }
