[package]
name = "native-backend-ref"
version = "0.1.0"
edition = "2021"
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
anyhow = "1"
blake3 = "1"
clap = { version = "4", features = ["derive"] }
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
p3-field = { workspace = true }
p3-goldilocks = { workspace = true }
p3-uni-stark = { workspace = true }
postcard = { version = "1", default-features = false, features = ["alloc"] }
protocol-versioning = { path = "../../protocol/versioning" }
superneo-ccs = { path = "../../circuits/superneo-ccs" }
superneo-core = { path = "../../circuits/superneo-core" }
transaction-core = { path = "../../circuits/transaction-core", features = ["serde"] }
transaction-circuit = { path = "../../circuits/transaction" }

[lints]
workspace = true
