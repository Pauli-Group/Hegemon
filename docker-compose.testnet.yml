# Hegemon Testnet Docker Compose Configuration
#
# This file configures a 3-node testnet for the Hegemon blockchain.
# 
# Usage:
#   1. Generate local native seed material and .env.testnet:
#      ./scripts/generate-testnet-keys.sh
#
#   2. Set environment variables:
#      source .env.testnet
#
#   3. Start the testnet:
#      docker-compose -f docker-compose.testnet.yml up -d

services:
  # Boot Node 1 - Primary mining node
  boot1:
    image: hegemon/node:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hegemon-boot1
    command:
      - --dev
      - --base-path=/data
      - --port=30333
      - --rpc-port=9944
      - --rpc-cors=all
      - --rpc-external
      - --rpc-methods=safe
      - --name=boot1
    environment:
      - RUST_LOG=info,hegemon=debug
      - HEGEMON_MINE=1
      - HEGEMON_MINE_THREADS=2
    volumes:
      - boot1-data:/data
    ports:
      - "30333:30333"   # P2P
      - "9944:9944"     # RPC
    networks:
      - hegemon-testnet
    restart: unless-stopped

  # Boot Node 2 - Secondary mining node
  boot2:
    image: hegemon/node:latest
    container_name: hegemon-boot2
    command:
      - --dev
      - --base-path=/data
      - --port=30333
      - --rpc-port=9944
      - --rpc-cors=all
      - --rpc-external
      - --rpc-methods=safe
      - --name=boot2
    environment:
      - RUST_LOG=info,hegemon=debug
      - HEGEMON_MINE=1
      - HEGEMON_MINE_THREADS=1
      - HEGEMON_SEEDS=boot1:30333
    volumes:
      - boot2-data:/data
    ports:
      - "30334:30333"
      - "9945:9944"
    networks:
      - hegemon-testnet
    depends_on:
      - boot1
    restart: unless-stopped

  # Boot Node 3 - Full node (non-mining)
  boot3:
    image: hegemon/node:latest
    container_name: hegemon-boot3
    command:
      - --dev
      - --base-path=/data
      - --port=30333
      - --rpc-port=9944
      - --rpc-cors=all
      - --rpc-external
      - --rpc-methods=safe
      - --name=boot3
    environment:
      - RUST_LOG=info,hegemon=debug
      - HEGEMON_SEEDS=boot1:30333
    volumes:
      - boot3-data:/data
    ports:
      - "30335:30333"
      - "9946:9944"
    networks:
      - hegemon-testnet
    depends_on:
      - boot1
    restart: unless-stopped

networks:
  hegemon-testnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  boot1-data:
  boot2-data:
  boot3-data:
