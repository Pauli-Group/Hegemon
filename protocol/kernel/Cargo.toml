[package]
name = "protocol-kernel"
version = "0.1.0"
edition = "2021"

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
sp-runtime = { workspace = true, default-features = false }
sp-std = { workspace = true, default-features = false }
protocol_versioning = { path = "../versioning", package = "protocol-versioning", default-features = false }
blake3 = { version = "1", default-features = false }

[features]
default = ["std"]
std = [
    "codec/std",
    "scale-info/std",
    "sp-runtime/std",
    "sp-std/std",
    "protocol_versioning/std",
    "blake3/std",
]

[lints]
workspace = true
