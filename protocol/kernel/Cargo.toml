[package]
name = "protocol-kernel"
version = "0.1.0"
edition = "2021"

[dependencies]
codec = { workspace = true, features = ["max-encoded-len"] }
scale-info = { workspace = true }
protocol_versioning = { path = "../versioning", package = "protocol-versioning", default-features = false }
protocol-shielded-pool = { path = "../shielded-pool", default-features = false }
blake3 = { version = "1", default-features = false }

[features]
default = ["std"]
std = [
    "codec/std",
    "scale-info/std",
    "protocol_versioning/std",
    "protocol-shielded-pool/std",
    "blake3/std",
]

[lints]
workspace = true
