[package]
name = "hegemon-risc0-bridge-methods"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[workspace]
members = [".", "guest"]
resolver = "2"

[package.metadata.risc0]
methods = ["guest"]

[build-dependencies]
risc0-build = "3.0.5"

[dependencies]
risc0-zkvm = { version = "3.0.5", default-features = false, features = ["std"] }
