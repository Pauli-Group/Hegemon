[package]
name = "pallet-kernel"
version = "0.1.0"
edition = "2021"
authors = ["Hegemon Contributors"]
description = "Kernel pallet for proof-native action envelopes and family routing."
license = "Apache-2.0"

[dependencies]
frame-support = { workspace = true }
frame-system = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
sp-core = { workspace = true }
codec = { workspace = true }
scale-info = { workspace = true }
serde = { version = "1", default-features = false, features = ["derive", "alloc"] }
protocol-kernel = { path = "../../protocol/kernel", default-features = false }
protocol_versioning = { path = "../../protocol/versioning", package = "protocol-versioning", default-features = false }

[dev-dependencies]
sp-io = { workspace = true, features = ["std"] }

[features]
default = ["std"]
std = [
    "frame-support/std",
    "frame-system/std",
    "sp-runtime/std",
    "sp-std/std",
    "sp-core/std",
    "codec/std",
    "scale-info/std",
    "serde/std",
    "protocol-kernel/std",
    "protocol_versioning/std",
]

[lints]
workspace = true
