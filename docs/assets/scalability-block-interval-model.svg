  <title>Block interval planning model</title>
  <desc>Stacked bar chart of projected daily growth on the shipped RecursiveBlockV1 lane at target block times of 1, 5, 10, and 30 seconds. Each bar is split into recursive proof bytes, public tx body bytes, and raw DA bytes.</desc>
