  <text x="112.0" y="148.0" fill="#5F6B7A" font-family="'Space Grotesk', Inter, sans-serif" font-size="18" font-weight="400" text-anchor="start" >Proof cost dominates until block intervals are long enough to carry meaningful shielded packing.</text>
  <text x="112.0" y="178.0" fill="#5F6B7A" font-family="'Space Grotesk', Inter, sans-serif" font-size="18" font-weight="400" text-anchor="start" >This view keeps recursive proof, public tx body, and raw DA separated.</text>
  <text x="112.0" y="208.0" fill="#5F6B7A" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="400" text-anchor="start" >Assumed packing: 1s-&gt;2 tx, 5s-&gt;8 tx, 10s-&gt;16 tx, 30s-&gt;64 tx. Values are projected GiB/day on the shipped lane.</text>
  <text x="112.0" y="232.0" fill="#5F6B7A" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="400" text-anchor="start" >At this scale the public tx body is visually negligible; the amber cap is the DA component.</text>
