  <text x="112.0" y="148.0" fill="#5F6B7A" font-family="'Space Grotesk', Inter, sans-serif" font-size="18" font-weight="400" text-anchor="start" >RecursiveBlockV1 = 699,404 B. Shallow packing makes chain growth proof-bound.</text>
  <text x="112.0" y="178.0" fill="#5F6B7A" font-family="'Space Grotesk', Inter, sans-serif" font-size="18" font-weight="400" text-anchor="start" >Packing 32-64 shielded tx per non-empty shielded block changes the slope materially.</text>
