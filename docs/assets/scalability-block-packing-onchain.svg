  <title>Shipped lane on-chain growth vs block packing</title>
  <desc>Line chart of on-chain growth on the shipped RecursiveBlockV1 lane as average shielded tx per block rises from 1 to 64. The y-axis uses a logarithmic scale. Three series show 1 TPS, 10 TPS, and 100 TPS.</desc>
