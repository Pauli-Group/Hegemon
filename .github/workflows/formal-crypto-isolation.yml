name: Formal cryptography isolation

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  formal-crypto-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Reject research dependencies in production authority
        run: bash scripts/check_formal_crypto.sh --isolation-only
