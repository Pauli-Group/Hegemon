name: Monorepo CI

on:
  push:
    branches: [ main ]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_TIMEOUT: "600"

jobs:
  rust-lints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "core-rust"
      - name: Lean lint gate
        run: ./scripts/check-core.sh lint

  core-tests:
    runs-on: ubuntu-latest
    needs: rust-lints
    env:
      PROPTEST_MAX_CASES: 64
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "core-rust"
      - name: Lean test gate
        run: ./scripts/check-core.sh test

  native-path-tests:
    runs-on: ubuntu-latest
    needs: rust-lints
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "native-path-tests"
      - name: Native shipped-path integration gate
        run: |
          cargo test -p wallet build_transaction_can_emit_native_tx_leaf_payloads -- --nocapture
          cargo test -p runtime --test kernel_wallet_transfer -- --nocapture
          cargo test -p consensus --test raw_active_mode raw_active_rejects_bad_tx_proof -- --nocapture
          cargo test -p consensus --test raw_active_mode receipt_root_ -- --nocapture
          cargo test -p hegemon-node extract_inline_transfer_accepts_native_tx_leaf_payload -- --nocapture
          cargo test -p hegemon-node receipt_root -- --nocapture

  native-backend-security:
    runs-on: ubuntu-latest
    needs: rust-lints
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev clang lld
      - name: Setup Rust toolchain
        run: |
          rustup show
          rustup toolchain install nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "native-backend-security"
      - name: Native backend review package gate
        run: |
          cargo test -p superneo-backend-lattice -p native-backend-ref -p superneo-hegemon -p superneo-bench
          cargo run -p native-backend-ref -- verify-vectors testdata/native_backend_vectors
          cargo run -p native-backend-timing --release
          cargo +nightly fuzz run native_tx_leaf_artifact -- -max_total_time=30
          cargo +nightly fuzz run receipt_root_artifact -- -max_total_time=30
          ./scripts/package_native_backend_review.sh
          ./scripts/verify_native_backend_review_package.sh

  release-build:
    runs-on: ubuntu-latest
    needs:
      - core-tests
      - native-path-tests
      - native-backend-security
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "core-rust"
      - name: Release node build
        run: ./scripts/check-core.sh build
