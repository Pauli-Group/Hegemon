name: Monorepo CI

on:
  push:
    branches: [ main ]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_TIMEOUT: "600"

jobs:
  rust-lints:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: "core-rust"
      - name: Lean lint gate
        run: ./scripts/check-core.sh lint

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: "dependency-audit"
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Dependency audit waiver gate
        run: ./scripts/dependency-audit-gate.sh

  formal-core-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev clang lld
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: "formal-core"
      - name: Formal-core checker gate
        run: bash scripts/check_formal_core.sh checker

  formal-core-lean:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: "formal-core"
      - name: Install Lean toolchain manager
        env:
          ELAN_INIT_SHA256: a620ff1641616222c8d37c54845492004bb84d6877cdbc944dd65c1aa685bf53
        run: |
          ELAN_INIT="$RUNNER_TEMP/elan-init.sh"
          curl --proto '=https' --tlsv1.2 --fail --location --show-error https://elan.lean-lang.org/elan-init.sh -o "$ELAN_INIT"
          printf '%s  %s\n' "$ELAN_INIT_SHA256" "$ELAN_INIT" | sha256sum -c -
          sh "$ELAN_INIT" -y --default-toolchain none
      - name: Formal-core proof-kernel gate
        run: bash scripts/check_formal_core.sh lean

  formal-core-vectors:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev clang lld
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: "formal-core"
      - name: Install Lean toolchain manager
        env:
          ELAN_INIT_SHA256: a620ff1641616222c8d37c54845492004bb84d6877cdbc944dd65c1aa685bf53
        run: |
          ELAN_INIT="$RUNNER_TEMP/elan-init.sh"
          curl --proto '=https' --tlsv1.2 --fail --location --show-error https://elan.lean-lang.org/elan-init.sh -o "$ELAN_INIT"
          printf '%s  %s\n' "$ELAN_INIT_SHA256" "$ELAN_INIT" | sha256sum -c -
          sh "$ELAN_INIT" -y --default-toolchain none
      - name: Formal-core Lean-to-Rust vector gate
        run: bash scripts/check_formal_core.sh vectors

  formal-core-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev clang lld
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: "formal-core"
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Formal-core claims and release-policy gate
        run: bash scripts/check_formal_core.sh policy

  formal-core:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - formal-core-checker
      - formal-core-lean
      - formal-core-vectors
      - formal-core-policy
    timeout-minutes: 2
    steps:
      - name: Require every formal-core shard
        env:
          CHECKER_RESULT: ${{ needs.formal-core-checker.result }}
          LEAN_RESULT: ${{ needs.formal-core-lean.result }}
          VECTORS_RESULT: ${{ needs.formal-core-vectors.result }}
          POLICY_RESULT: ${{ needs.formal-core-policy.result }}
        run: |
          test "$CHECKER_RESULT" = success
          test "$LEAN_RESULT" = success
          test "$VECTORS_RESULT" = success
          test "$POLICY_RESULT" = success

  core-test-shards:
    name: core-tests / ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard:
          - base
          - transaction-lib
          - transaction-integration
          - wallet-base
          - wallet-multisig-setup
          - wallet-multisig-builders
          - wallet-multisig-drift
          - node-default
          - node-minimal
    env:
      PROPTEST_CASES: 64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: "core-rust"
      - name: Core test shard
        run: ./scripts/check-core.sh "test-${{ matrix.shard }}"

  core-tests:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: core-test-shards
    timeout-minutes: 2
    steps:
      - name: Require every core test shard
        env:
          SHARD_RESULT: ${{ needs.core-test-shards.result }}
        run: test "$SHARD_RESULT" = success

  native-path-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: "native-path-tests"
      - name: Native shipped-path integration gate
        run: |
          ./scripts/run_exact_cargo_lib_test.sh wallet tx_builder::tests::build_transaction_can_emit_native_tx_leaf_payloads
          ./scripts/run_exact_cargo_lib_test.sh hegemon-node native::tests::submit_action_stages_and_imports_shielded_transfer --no-default-features
          ./scripts/run_exact_cargo_lib_test.sh hegemon-node native::tests::coinbase_action_mints_shielded_output_and_updates_supply --no-default-features
          ./scripts/run_exact_cargo_lib_test.sh transaction-circuit smallwood_engine::tests::verifier_rejects_forged_self_consistent_pcs_layer
          ./scripts/run_exact_cargo_lib_test.sh block-recursion tests::recursive_proof_envelope_component_checks_reject_tampered_envelope
          ./scripts/run_exact_cargo_lib_test.sh hegemon-node native::tests::imported_block_actions_require_canonical_transfer_order --no-default-features
          ./scripts/run_exact_cargo_lib_test.sh hegemon-node native::tests::block_artifact_binding_rejects_candidate_artifact_mismatches_in_order --no-default-features
          ./scripts/run_exact_cargo_lib_test.sh consensus proof::tests::recursive_block_v2_product_wrapper_rejects_independent_artifact_mutations

  app-no-ssh-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HEGEMON_E2E_MINE_THREADS: "4"
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install app dependencies
        run: npm ci --prefix hegemon-app
      - name: App UI guard gate
        run: npm --prefix hegemon-app run check:ui-guards
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: "app-no-ssh-e2e"
      - name: App no-SSH release workflow
        run: ./scripts/check-app-no-ssh-e2e.sh

  security-adversarial:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROPTEST_CASES: 64
      HEGEMON_REDTEAM_MODE: ci
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev clang lld
      - name: Setup Rust toolchain
        run: rustup show
      - name: Install Lean toolchain manager
        env:
          ELAN_INIT_SHA256: a620ff1641616222c8d37c54845492004bb84d6877cdbc944dd65c1aa685bf53
        run: |
          ELAN_INIT="$RUNNER_TEMP/elan-init.sh"
          curl --proto '=https' --tlsv1.2 --fail --location --show-error https://elan.lean-lang.org/elan-init.sh -o "$ELAN_INIT"
          printf '%s  %s\n' "$ELAN_INIT_SHA256" "$ELAN_INIT" | sha256sum -c -
          sh "$ELAN_INIT" -y --default-toolchain none
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: "security-adversarial"
      - name: Proving red-team gate
        run: bash scripts/run_proving_redteam.sh

  native-backend-security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HEGEMON_TIMING_SAMPLE_COUNT: "16"
      HEGEMON_TIMING_WARMUP_COUNT: "4"
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev clang lld
      - name: Setup Rust toolchain
        run: |
          rustup show
          rustup toolchain install nightly-2026-06-23
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.2 --locked
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: "native-backend-security"
      - name: Native backend review package gate
        run: |
          cargo test -p superneo-backend-lattice -p native-backend-ref -p superneo-hegemon -p superneo-bench
          cargo run -p native-backend-ref -- verify-vectors testdata/native_backend_vectors
          cargo run -p native-backend-timing --release
          bash scripts/verify_native_receipt_root_scalability.sh
          cargo +nightly-2026-06-23 fuzz run native_tx_leaf_artifact -- -max_total_time=30
          cargo +nightly-2026-06-23 fuzz run receipt_root_artifact -- -max_total_time=30
          ./scripts/verify_native_backend_review_package.sh
          python3 -I scripts/test_verify_native_backend_review_package.py
          cp audits/native-backend-128b/native-backend-128b-review-package.tar.gz /tmp/native-backend-review-package.tar.gz
          cp audits/native-backend-128b/package.sha256 /tmp/native-backend-review-package.sha256
          ./scripts/package_native_backend_review.sh
          cmp /tmp/native-backend-review-package.tar.gz audits/native-backend-128b/native-backend-128b-review-package.tar.gz
          cmp /tmp/native-backend-review-package.sha256 audits/native-backend-128b/package.sha256
          ./scripts/check_native_backend_release_posture.sh --package audits/native-backend-128b/native-backend-128b-review-package.tar.gz

  release-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - rust-lints
      - dependency-audit
      - formal-core
      - core-tests
      - native-path-tests
      - app-no-ssh-e2e
      - security-adversarial
      - native-backend-security
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev
      - name: Setup Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: "core-rust"
      - name: Release binary build
        run: ./scripts/check-core.sh build

      - name: Release PQ binary audit
        run: ./scripts/security-audit.sh --require-binary --binary-manifest target/release/hegemon-release-artifacts.json --node-bin target/release/hegemon-node --binary target/release/wallet --binary target/release/walletd
