name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_TIMEOUT: "600"

permissions:
  contents: read

jobs:
  security-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev clang lld

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: "1.91.1"
          components: rust-src

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Install Lean toolchain manager
        env:
          ELAN_INIT_SHA256: a620ff1641616222c8d37c54845492004bb84d6877cdbc944dd65c1aa685bf53
        run: |
          ELAN_INIT="$RUNNER_TEMP/elan-init.sh"
          curl --proto '=https' --tlsv1.2 --fail --location --show-error https://elan.lean-lang.org/elan-init.sh -o "$ELAN_INIT"
          printf '%s  %s\n' "$ELAN_INIT_SHA256" "$ELAN_INIT" | sha256sum -c -
          sh "$ELAN_INIT" -y --default-toolchain none

      - name: Dependency audit waiver gate
        run: ./scripts/dependency-audit-gate.sh

      - name: Formal-core release gate
        run: bash scripts/check_formal_core.sh

      - name: Native backend review package verification
        run: ./scripts/verify_native_backend_review_package.sh

      - name: Native backend release posture gate
        run: ./scripts/check_native_backend_release_posture.sh --package audits/native-backend-128b/native-backend-128b-review-package.tar.gz

  app-no-ssh-e2e:
    runs-on: ubuntu-latest
    needs: security-gates
    env:
      HEGEMON_E2E_MINE_THREADS: "4"
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install app dependencies
        run: npm ci --prefix hegemon-app

      - name: App UI guard gate
        run: npm --prefix hegemon-app run check:ui-guards

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libclang-dev

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: "1.91.1"
          components: rust-src

      - name: App no-SSH release workflow
        run: ./scripts/check-app-no-ssh-e2e.sh

  build-linux:
    runs-on: ubuntu-latest
    needs:
      - security-gates
      - app-no-ssh-e2e
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: "1.91.1"
          components: rust-src
      
      - name: Build attested release artifacts
        run: ./scripts/build_release_artifacts.sh

      - name: Verify release artifact manifest
        run: python3 scripts/release_artifact_manifest.py verify --manifest target/release/hegemon-release-artifacts.json --expect hegemon-node:hegemon-node:target/release/hegemon-node --expect wallet:wallet:target/release/wallet --expect walletd:walletd:target/release/walletd

      - name: Release PQ binary audit
        run: ./scripts/security-audit.sh --require-binary --binary-manifest target/release/hegemon-release-artifacts.json --node-bin target/release/hegemon-node --binary target/release/wallet --binary target/release/walletd
      
      - name: Package manifest-bound release assets
        run: python3 scripts/release_artifact_manifest.py package --manifest target/release/hegemon-release-artifacts.json --expect hegemon-node:hegemon-node:target/release/hegemon-node --expect wallet:wallet:target/release/wallet --expect walletd:walletd:target/release/walletd --asset hegemon-node:hegemon-node:hegemon-node-linux-x86_64 --asset wallet:wallet:wallet-linux-x86_64 --asset walletd:walletd:walletd-linux-x86_64 --output-dir release --asset-manifest-name hegemon-release-assets-linux-x86_64.json
      
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: linux-binary
          path: release/

  build-macos-intel:
    runs-on: macos-15-intel
    needs:
      - security-gates
      - app-no-ssh-e2e
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      
      - name: Install dependencies
        run: |
          brew install protobuf
      
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: "1.91.1"
          targets: x86_64-apple-darwin
          components: rust-src
      
      - name: Build attested release artifacts
        run: ./scripts/build_release_artifacts.sh --target x86_64-apple-darwin

      - name: Verify release artifact manifest
        run: python3 scripts/release_artifact_manifest.py verify --manifest target/x86_64-apple-darwin/release/hegemon-release-artifacts.json --expect hegemon-node:hegemon-node:target/x86_64-apple-darwin/release/hegemon-node --expect wallet:wallet:target/x86_64-apple-darwin/release/wallet --expect walletd:walletd:target/x86_64-apple-darwin/release/walletd

      - name: Release PQ binary audit
        run: ./scripts/security-audit.sh --require-binary --binary-manifest target/x86_64-apple-darwin/release/hegemon-release-artifacts.json --node-bin target/x86_64-apple-darwin/release/hegemon-node --binary target/x86_64-apple-darwin/release/wallet --binary target/x86_64-apple-darwin/release/walletd
      
      - name: Package manifest-bound release assets
        run: python3 scripts/release_artifact_manifest.py package --manifest target/x86_64-apple-darwin/release/hegemon-release-artifacts.json --expect hegemon-node:hegemon-node:target/x86_64-apple-darwin/release/hegemon-node --expect wallet:wallet:target/x86_64-apple-darwin/release/wallet --expect walletd:walletd:target/x86_64-apple-darwin/release/walletd --asset hegemon-node:hegemon-node:hegemon-node-macos-x86_64 --asset wallet:wallet:wallet-macos-x86_64 --asset walletd:walletd:walletd-macos-x86_64 --output-dir release --asset-manifest-name hegemon-release-assets-macos-x86_64.json
      
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: macos-intel-binary
          path: release/

  build-macos-arm:
    runs-on: macos-14  # Apple Silicon runner
    needs:
      - security-gates
      - app-no-ssh-e2e
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      
      - name: Install dependencies
        run: |
          brew install protobuf
      
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: "1.91.1"
          components: rust-src
      
      - name: Build attested release artifacts
        run: ./scripts/build_release_artifacts.sh

      - name: Verify release artifact manifest
        run: python3 scripts/release_artifact_manifest.py verify --manifest target/release/hegemon-release-artifacts.json --expect hegemon-node:hegemon-node:target/release/hegemon-node --expect wallet:wallet:target/release/wallet --expect walletd:walletd:target/release/walletd

      - name: Release PQ binary audit
        run: ./scripts/security-audit.sh --require-binary --binary-manifest target/release/hegemon-release-artifacts.json --node-bin target/release/hegemon-node --binary target/release/wallet --binary target/release/walletd
      
      - name: Package manifest-bound release assets
        run: python3 scripts/release_artifact_manifest.py package --manifest target/release/hegemon-release-artifacts.json --expect hegemon-node:hegemon-node:target/release/hegemon-node --expect wallet:wallet:target/release/wallet --expect walletd:walletd:target/release/walletd --asset hegemon-node:hegemon-node:hegemon-node-macos-arm64 --asset wallet:wallet:wallet-macos-arm64 --asset walletd:walletd:walletd-macos-arm64 --output-dir release --asset-manifest-name hegemon-release-assets-macos-arm64.json
      
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: macos-arm-binary
          path: release/

  build-windows:
    runs-on: windows-latest
    needs:
      - security-gates
      - app-no-ssh-e2e
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      
      - name: Install LLVM
        run: choco install llvm -y
      
      - name: Install Protobuf
        run: choco install protoc -y
      
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: "1.91.1"
          components: rust-src
      
      - name: Build attested release artifacts
        shell: bash
        run: ./scripts/build_release_artifacts.sh

      - name: Verify release artifact manifest
        shell: bash
        run: python3 scripts/release_artifact_manifest.py verify --manifest target/release/hegemon-release-artifacts.json --expect hegemon-node:hegemon-node:target/release/hegemon-node.exe --expect wallet:wallet:target/release/wallet.exe --expect walletd:walletd:target/release/walletd.exe

      - name: Release PQ binary audit
        shell: bash
        run: ./scripts/security-audit.sh --require-binary --binary-manifest target/release/hegemon-release-artifacts.json --node-bin target/release/hegemon-node.exe --binary target/release/wallet.exe --binary target/release/walletd.exe
      
      - name: Package manifest-bound release assets
        shell: bash
        run: python3 scripts/release_artifact_manifest.py package --manifest target/release/hegemon-release-artifacts.json --expect hegemon-node:hegemon-node:target/release/hegemon-node.exe --expect wallet:wallet:target/release/wallet.exe --expect walletd:walletd:target/release/walletd.exe --asset hegemon-node:hegemon-node:hegemon-node-windows-x86_64.exe --asset wallet:wallet:wallet-windows-x86_64.exe --asset walletd:walletd:walletd-windows-x86_64.exe --output-dir release --asset-manifest-name hegemon-release-assets-windows-x86_64.json
      
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: windows-binary
          path: release/

  create-release:
    needs: [build-linux, build-macos-intel, build-macos-arm, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts
      
      - name: Verify and assemble manifest-bound release assets
        run: python3 scripts/release_artifact_manifest.py assemble --bundle-manifest artifacts/linux-binary/hegemon-release-assets-linux-x86_64.json --bundle-manifest artifacts/macos-intel-binary/hegemon-release-assets-macos-x86_64.json --bundle-manifest artifacts/macos-arm-binary/hegemon-release-assets-macos-arm64.json --bundle-manifest artifacts/windows-binary/hegemon-release-assets-windows-x86_64.json --output-dir release-assets
      
      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
