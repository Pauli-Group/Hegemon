name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_TIMEOUT: "600"

permissions:
  contents: write

jobs:
  security-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev clang lld

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.1"
          components: rust-src

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install Lean toolchain manager
        run: curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -s -- -y --default-toolchain none

      - name: Dependency audit waiver gate
        run: ./scripts/dependency-audit-gate.sh

      - name: Formal-core release gate
        run: bash scripts/check_formal_core.sh

      - name: Native backend review package verification
        run: ./scripts/verify_native_backend_review_package.sh

      - name: Native backend release posture gate
        run: ./scripts/check_native_backend_release_posture.sh --package audits/native-backend-128b/native-backend-128b-review-package.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    needs: security-gates
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.1"
          components: rust-src
      
      - name: Build node binary
        run: cargo build -p hegemon-node --release

      - name: Build wallet binaries
        run: cargo build -p wallet -p walletd --release

      - name: Release PQ binary audit
        run: ./scripts/security-audit.sh --require-binary --node-bin target/release/hegemon-node --binary target/release/wallet --binary target/release/walletd
      
      - name: Package binary
        run: |
          mkdir -p release
          cp target/release/hegemon-node release/hegemon-node-linux-x86_64
          cp target/release/wallet release/wallet-linux-x86_64
          cd release
          sha256sum hegemon-node-linux-x86_64 > hegemon-node-linux-x86_64.sha256
          sha256sum wallet-linux-x86_64 > wallet-linux-x86_64.sha256
      
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: release/

  build-macos-intel:
    runs-on: macos-15  # Cross-compile for Intel from ARM runner
    needs: security-gates
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install protobuf
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.1"
          targets: x86_64-apple-darwin
          components: rust-src
      
      - name: Build node binary (cross-compile for Intel)
        run: cargo build -p hegemon-node --release --target x86_64-apple-darwin

      - name: Build wallet binaries (cross-compile for Intel)
        run: cargo build -p wallet -p walletd --release --target x86_64-apple-darwin

      - name: Release PQ binary audit
        run: ./scripts/security-audit.sh --require-binary --node-bin target/x86_64-apple-darwin/release/hegemon-node --binary target/x86_64-apple-darwin/release/wallet --binary target/x86_64-apple-darwin/release/walletd
      
      - name: Package binary
        run: |
          mkdir -p release
          cp target/x86_64-apple-darwin/release/hegemon-node release/hegemon-node-macos-x86_64
          cp target/x86_64-apple-darwin/release/wallet release/wallet-macos-x86_64
          cd release
          shasum -a 256 hegemon-node-macos-x86_64 > hegemon-node-macos-x86_64.sha256
          shasum -a 256 wallet-macos-x86_64 > wallet-macos-x86_64.sha256
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos-intel-binary
          path: release/

  build-macos-arm:
    runs-on: macos-14  # Apple Silicon runner
    needs: security-gates
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install protobuf
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.1"
          components: rust-src
      
      - name: Build node binary
        run: cargo build -p hegemon-node --release

      - name: Build wallet binaries
        run: cargo build -p wallet -p walletd --release

      - name: Release PQ binary audit
        run: ./scripts/security-audit.sh --require-binary --node-bin target/release/hegemon-node --binary target/release/wallet --binary target/release/walletd
      
      - name: Package binary
        run: |
          mkdir -p release
          cp target/release/hegemon-node release/hegemon-node-macos-arm64
          cp target/release/wallet release/wallet-macos-arm64
          cd release
          shasum -a 256 hegemon-node-macos-arm64 > hegemon-node-macos-arm64.sha256
          shasum -a 256 wallet-macos-arm64 > wallet-macos-arm64.sha256
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm-binary
          path: release/

  build-windows:
    runs-on: windows-latest
    needs: security-gates
    steps:
      - uses: actions/checkout@v4
      
      - name: Install LLVM
        run: choco install llvm -y
      
      - name: Install Protobuf
        run: choco install protoc -y
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.1"
          components: rust-src
      
      - name: Build node binary
        run: cargo build -p hegemon-node --release

      - name: Build wallet binaries
        run: cargo build -p wallet -p walletd --release

      - name: Release PQ binary audit
        shell: bash
        run: ./scripts/security-audit.sh --require-binary --node-bin target/release/hegemon-node.exe --binary target/release/wallet.exe --binary target/release/walletd.exe
      
      - name: Package binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item target\release\hegemon-node.exe release\hegemon-node-windows-x86_64.exe
          Copy-Item target\release\wallet.exe release\wallet-windows-x86_64.exe
          cd release
          Get-FileHash hegemon-node-windows-x86_64.exe -Algorithm SHA256 | Format-List > hegemon-node-windows-x86_64.exe.sha256
          Get-FileHash wallet-windows-x86_64.exe -Algorithm SHA256 | Format-List > wallet-windows-x86_64.exe.sha256
      
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: release/

  create-release:
    needs: [build-linux, build-macos-intel, build-macos-arm, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/linux-binary/* release-assets/
          cp artifacts/macos-intel-binary/* release-assets/
          cp artifacts/macos-arm-binary/* release-assets/
          cp artifacts/windows-binary/* release-assets/
          ls -la release-assets/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
