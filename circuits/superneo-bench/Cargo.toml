libc = "0.2"
hex = "0.4"
p3-goldilocks = { workspace = true }
superneo-backend-lattice = { path = "../superneo-backend-lattice" }
superneo-ccs = { path = "../superneo-ccs" }
superneo-core = { path = "../superneo-core" }
superneo-hegemon = { path = "../superneo-hegemon" }
superneo-ring = { path = "../superneo-ring" }
transaction-circuit = { path = "../transaction" }

[lints]
workspace = true
