[package]
name = "superneo-bench"
version = "0.1.0"
edition = "2021"
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
anyhow = "1"
bincode = "1.3"
clap = { version = "4", features = ["derive"] }
consensus = { path = "../../consensus" }
serde = { version = "1", features = ["derive"] }
